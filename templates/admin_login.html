<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Login — SkillCheck</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}"/>
</head>
<body>
<div class="page-wrap">

  <nav class="navbar">
    <a href="/" class="nav-brand">
      <span class="nav-brand-icon">
        <svg viewBox="0 0 24 24"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
      </span>
      SkillCheck
    </a>
    <div class="nav-links">
      <a href="/">
        <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
        <span>Back to Quiz</span>
      </a>
    </div>
  </nav>

  <div class="container">
    <div class="login-wrap">

      <div class="login-logo">
        <div class="login-logo-icon">
          <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        </div>
        <h1 class="login-title">Admin Access</h1>
        <p class="login-sub">Enter your secret key to continue</p>
      </div>

      <div class="card">

        {% if error %}
        <div class="alert alert-error">
          <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
          {{ error }}
        </div>
        {% endif %}

        <form method="POST">
          <div class="form-group">
            <label>Admin Key</label>
            <div class="key-input-wrap">
              <input
                type="password"
                name="admin_key"
                id="admin-key-input"
                placeholder="Enter admin key"
                required
                autocomplete="current-password"
              />
              <button type="button" class="eye-btn" onclick="toggleEye('admin-key-input', this)">
                <svg viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              </button>
            </div>
          </div>

          <button type="submit" class="btn btn-primary btn-full btn-lg" style="margin-top:0.5rem">
            <svg viewBox="0 0 24 24"><polyline points="15 3 21 3 21 9"/><path d="M10 14 21 3"/><path d="M21 16v5a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5"/></svg>
            Login
          </button>
        </form>
      </div>

      <p class="text-center mt-2" style="font-size:0.85rem; color:var(--text-3)">
        Not an admin?
        <a href="/" style="color:var(--accent); text-decoration:none; font-weight:600;">Take a quiz instead</a>
      </p>

    </div>
  </div>
</div>

<script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
